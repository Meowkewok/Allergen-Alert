<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Allergen Alert!</h1>
    
    <div class="options-group">
        <label><input type="checkbox" id="SoyCheckbox"> Soy Allergens</label>
        <label><input type="checkbox" id="DairyCheckbox"> Dairy Allergens</label>
        <label><input type="checkbox" id="PeanutCheckbox"> Peanut Allergens</label>
        <label><input type="checkbox" id="TreeNutCheckbox"> Tree Nut Allergens</label>
        <label><input type="checkbox" id="GlutenCheckbox"> Gluten/Wheat</label>
        <hr>
        <label><input type="checkbox" id="KashrutCheckbox"> Kashrut Restrictions</label>
        <label><input type="checkbox" id="VegCheckbox"> Vegetarian Mode</label>
    </div>

    <button id="scanBtn">Check for Allergens</button>
    <button id="subBtn" style="background-color: #0056b3; margin-top: 10px;">Check Substitutes</button>

    <div id="resultsArea"></div>

    <script src="data.js"></script>
    <script src="popup.js"></script>
</body>
</html>
